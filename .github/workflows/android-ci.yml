name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x ./gradlew

      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug --no-daemon --console=plain

      - name: Unit Tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --console=plain

      - name: AndroidTest Compile Check
        run: ./gradlew :app:compileDebugAndroidTestKotlin --no-daemon --console=plain
